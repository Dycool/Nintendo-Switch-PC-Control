name: Build Linux

on:
  push:
    paths:
      - 'client/linux/**'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev libgtk-3-dev

      - name: Build Terminal Client
        run: |
          cd client/linux/
          g++ -O3 -std=c++17 ns-gamepad.cpp -o ns-gamepad -lpthread -lSDL2

      - name: Build GUI Client (GTK3)
        run: |
          cd client/linux/
          g++ -O3 -std=c++17 ns-gui.cpp -o ns-gui \
            $(pkg-config --cflags --libs gtk+-3.0) -lpthread -lSDL2

      - uses: actions/upload-artifact@v6
        with:
          name: linux-gamepad
          path: client/linux/ns-gamepad

      - uses: actions/upload-artifact@v6
        with:
          name: linux-gui
          path: client/linux/ns-gui
