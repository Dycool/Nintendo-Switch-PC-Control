name: Build All Binaries and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-clients:
    uses: ./.github/workflows/build-clients.yml

  build-server:
    uses: ./.github/workflows/build-server.yml

  build-mobile:
    uses: ./.github/workflows/build-mobile.yml

  release:
    needs: [build-clients, build-server, build-mobile]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Show downloaded artifact tree
        run: |
          find artifacts -maxdepth 4 -type f -print | sort

      - name: Create Release Zips
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _zips

          require_file() {
            local path="$1"
            local label="$2"
            if [ -z "$path" ] || [ ! -f "$path" ]; then
              echo "Missing $label artifact"
              echo "Downloaded files:"
              find artifacts -maxdepth 5 -type f -print | sort
              exit 1
            fi
          }

          # New artifact names from build-clients.yml:
          #   windows-static-exe/ns-client.exe
          #   linux-appimage/ns-client-x86_64.AppImage
          #   macos-app/ns-client-macos.app.zip
          # New artifact names from build-mobile.yml:
          #   ns-control-android-debug-apk/app-debug.apk
          #   ns-control-ios-unsigned-app/NSControl-ios-unsigned.app.zip
          # Server workflow can vary, so find ns-backend by filename.

          WINDOWS_EXE="$(find artifacts -type f -name 'ns-client.exe' -print -quit)"
          LINUX_APPIMAGE="$(find artifacts -type f -name 'ns-client*.AppImage' -print -quit)"
          MAC_ZIP="$(find artifacts -type f \( -name 'ns-client-macos.app.zip' -o -name '*macos*.zip' -o -name '*.app.zip' \) -print -quit)"
          PI_BACKEND="$(find artifacts -type f -name 'ns-backend' -print -quit)"
          ANDROID_APK="$(find artifacts -type f -name 'app-debug.apk' -print -quit)"
          IOS_ZIP="$(find artifacts -type f \( -name 'NSControl-ios-unsigned.app.zip' -o -name '*ios*.zip' -o -name '*.app.zip' \) -print -quit)"

          require_file "$WINDOWS_EXE" "Windows ns-client.exe"
          require_file "$LINUX_APPIMAGE" "Linux AppImage"
          require_file "$MAC_ZIP" "macOS .app zip"
          require_file "$PI_BACKEND" "Raspberry Pi ns-backend"
          require_file "$ANDROID_APK" "Android APK"
          require_file "$IOS_ZIP" "iOS .app zip"

          # Avoid accidentally picking the macOS .app zip for iOS if both match *.app.zip.
          if [ "$IOS_ZIP" = "$MAC_ZIP" ]; then
            IOS_ZIP="$(find artifacts/ns-control-ios-unsigned-app -type f -name '*.zip' -print -quit 2>/dev/null || true)"
            require_file "$IOS_ZIP" "iOS .app zip"
          fi

          # Windows: one real static .exe inside release zip.
          mkdir -p _zips/_windows
          cp "$WINDOWS_EXE" _zips/_windows/ns-client.exe
          (cd _zips/_windows && zip -r ../ns-pc-control-windows.zip .)
          rm -rf _zips/_windows

          # Linux: one AppImage inside release zip.
          mkdir -p _zips/_linux
          cp "$LINUX_APPIMAGE" _zips/_linux/ns-client-x86_64.AppImage
          chmod +x _zips/_linux/ns-client-x86_64.AppImage
          (cd _zips/_linux && zip -r ../ns-pc-control-linux.zip .)
          rm -rf _zips/_linux

          # macOS: build-clients already created a proper .app zip, so reuse it.
          cp "$MAC_ZIP" _zips/ns-pc-control-mac.zip

          # Raspberry Pi unified server.
          mkdir -p _zips/_pi
          cp "$PI_BACKEND" _zips/_pi/ns-backend
          chmod +x _zips/_pi/ns-backend
          (cd _zips/_pi && zip -r ../ns-pc-control-raspberry-pi.zip ns-backend)
          rm -rf _zips/_pi

          # Android APK.
          mkdir -p _zips/_android
          cp "$ANDROID_APK" _zips/_android/app-debug.apk
          (cd _zips/_android && zip -r ../ns-pc-control-android.zip .)
          rm -rf _zips/_android

          # iOS unsigned .app bundle zip, already packaged by build-mobile.
          cp "$IOS_ZIP" _zips/ns-pc-control-ios.zip

          echo "Release zips:"
          ls -lh _zips

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            _zips/ns-pc-control-windows.zip
            _zips/ns-pc-control-linux.zip
            _zips/ns-pc-control-mac.zip
            _zips/ns-pc-control-raspberry-pi.zip
            _zips/ns-pc-control-android.zip
            _zips/ns-pc-control-ios.zip
          draft: true
          generate_release_notes: true
