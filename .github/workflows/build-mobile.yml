name: Build Mobile Apps

on:
  push:
    paths:
      - 'client/mobile/**'
      - '.github/workflows/build-mobile.yml'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        run: |
          cd client/mobile/android
          gradle assembleDebug --no-daemon

      - uses: actions/upload-artifact@v6
        with:
          name: ns-control-android
          path: client/mobile/android/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          cd client/mobile/ios
          xcodegen generate

      - name: Build iOS app (unsigned)
        run: |
          cd client/mobile/ios
          xcodebuild \
            -project NSControl.xcodeproj \
            -scheme NSControl \
            -sdk iphoneos \
            -configuration Release \
            SYMROOT=build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Prepare artifact
        run: |
          mkdir -p _artifact
          cp -r client/mobile/ios/build/Release-iphoneos/NSControl.app _artifact/

      - uses: actions/upload-artifact@v6
        with:
          name: ns-control-ios
          path: _artifact/NSControl.app
